# === Project identity ===
sonar.projectKey=com.bosch.pt.bass.web
sonar.projectName=bassnext.web
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# === Where is your code & tests? ===
sonar.sources=src
sonar.tests=src

# Test files (Vitest)
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# === TypeScript configuration ===
# Used by SonarTS to understand paths, aliases, etc.
sonar.typescript.tsconfigPath=tsconfig.json

# === Coverage from Vitest (lcov) ===
# vitest generates coverage/lcov.info with your current config
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# === Ignore generated / infra / config files from code analysis ===
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/vite.config.*,\
  **/vitest.config.*,\
  **/tailwind.config.*,\
  **/postcss.config.*,\
  **/eslint.config.*,\
  **/commitlint.config.*,\
  src/vite-env.d.ts,\
  src/setupTests.ts

# Exclude some files from coverage specifically (entrypoint, setup, env)
sonar.coverage.exclusions=\
  **/*.d.ts,\
  src/vite-env.d.ts,\
  src/setupTests.ts,\
  src/main.tsx